<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardX — Link Preview Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #f0f2f5;
      --bg-card:    #ffffff;
      --bg-input:   #f0f2f5;
      --bg-preview: #f0f2f5;
      --text-main:  #050505;
      --text-muted: #65676b;
      --text-hint:  #8a8d91;
      --border:     rgba(0,0,0,0.12);
      --blue:       #1877f2;
      --blue-hover: #166fe5;
      --red:        #e53935;
      --green:      #2e7d32;
      --radius-md:  8px;
      --radius-lg:  12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:    #18191a;
        --bg-card:    #242526;
        --bg-input:   #3a3b3c;
        --bg-preview: #3a3b3c;
        --text-main:  #e4e6eb;
        --text-muted: #b0b3b8;
        --text-hint:  #8a8d91;
        --border:     rgba(255,255,255,0.1);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(0,0,0,0.15);
    }

    /* Header */
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text-main); flex: 1; text-align: center; }
    .btn-close {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg-input); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-main); font-size: 18px;
    }

    /* User */
    .user-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0;
    }
    .user-name { font-size: 15px; font-weight: 600; color: var(--text-main); }
    .pub-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 12px; font-weight: 600; color: var(--text-main);
      background: var(--bg-input); border-radius: 4px;
      padding: 2px 6px; margin-top: 3px; cursor: pointer;
      border: 0.5px solid var(--border);
    }

    /* Post text */
    .post-text {
      width: 100%; border: none; outline: none; resize: none;
      font-size: 18px; color: var(--text-main); background: transparent;
      padding: 0 16px 12px; min-height: 70px;
      font-family: var(--font); line-height: 1.5;
    }
    .post-text::placeholder { color: var(--text-hint); }

    /* URL bar */
    .url-section { padding: 0 16px 12px; display: flex; gap: 8px; }
    .url-input {
      flex: 1; border: 0.5px solid var(--border);
      border-radius: var(--radius-md); padding: 8px 12px;
      font-size: 13px; background: var(--bg-input);
      color: var(--text-main); outline: none; font-family: var(--font);
    }
    .url-input:focus { border-color: var(--blue); }
    .btn-fetch {
      background: var(--blue); color: #fff; border: none;
      border-radius: var(--radius-md); padding: 8px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; font-family: var(--font); min-width: 70px;
    }
    .btn-fetch:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-fetch:hover:not(:disabled) { background: var(--blue-hover); }

    /* Status */
    .status {
      font-size: 12px; text-align: center;
      padding: 0 16px 8px; display: none; line-height: 1.5;
    }
    .status.error { color: var(--red); }
    .status.info  { color: var(--text-hint); }
    .status.ok    { color: var(--green); }

    /* Loading bar */
    .loader {
      height: 3px; background: var(--blue);
      width: 0; transition: width 0.4s ease;
      display: none;
    }

    /* Preview card */
    .preview-wrap { position: relative; }
    .preview-card {
      margin: 0 16px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden; display: none;
    }
    .preview-img-wrap {
      position: relative; background: var(--bg-input);
      min-height: 180px; display: flex;
      align-items: center; justify-content: center;
    }
    .preview-img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
    .img-placeholder {
      color: var(--text-hint); font-size: 13px;
      text-align: center; padding: 2rem; display: none;
    }
    .edit-img-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.6); color: #fff; border: none;
      border-radius: 6px; padding: 5px 10px; font-size: 12px;
      cursor: pointer; font-family: var(--font);
    }
    .edit-img-btn:hover { background: rgba(0,0,0,0.85); }

    .preview-body { padding: 10px 12px; background: var(--bg-preview); }
    .preview-domain {
      font-size: 11px; color: var(--text-hint);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
    }
    .preview-title {
      font-size: 15px; font-weight: 600; color: var(--text-main);
      line-height: 1.4; outline: none; border: none;
      background: transparent; width: 100%;
      font-family: var(--font); resize: none; padding: 2px 4px;
      border-radius: 4px;
    }
    .preview-title:focus { background: rgba(24,119,242,0.08); }
    .preview-desc {
      font-size: 13px; color: var(--text-muted); margin-top: 4px;
      outline: none; border: none; background: transparent;
      width: 100%; font-family: var(--font); resize: none;
      line-height: 1.5; padding: 2px 4px; border-radius: 4px;
    }
    .preview-desc:focus { background: rgba(24,119,242,0.08); }
    .edit-hint {
      font-size: 11px; color: var(--text-hint);
      text-align: center; margin-top: 6px; display: none;
    }

    .remove-row {
      display: flex; justify-content: center; padding: 2px;
      border-top: 0.5px solid var(--border);
    }
    .remove-btn {
      background: none; border: none; color: var(--text-hint);
      font-size: 12px; cursor: pointer; padding: 4px 10px;
      border-radius: 4px; font-family: var(--font);
    }
    .remove-btn:hover { background: var(--bg-input); color: var(--red); }

    /* Image modal */
    .img-modal {
      display: none; position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.65);
      align-items: center; justify-content: center; z-index: 10;
      min-height: 200px;
    }
    .img-modal.open { display: flex; }
    .img-modal-box {
      background: var(--bg-card); border-radius: var(--radius-lg);
      padding: 16px; width: 90%; max-width: 340px;
    }
    .img-modal-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: var(--text-main); }
    .img-url-input {
      width: 100%; border: 0.5px solid var(--border);
      border-radius: var(--radius-md); padding: 8px 12px;
      font-size: 13px; background: var(--bg-input);
      color: var(--text-main); outline: none; font-family: var(--font);
      margin-bottom: 10px;
    }
    .img-url-input:focus { border-color: var(--blue); }
    .img-modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      background: var(--bg-input); color: var(--text-main);
      border: 0.5px solid var(--border); border-radius: var(--radius-md);
      padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: var(--font);
    }
    .btn-apply {
      background: var(--blue); color: #fff; border: none;
      border-radius: var(--radius-md); padding: 7px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font);
    }
    .btn-apply:hover { background: var(--blue-hover); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; border-top: 0.5px solid var(--border);
    }
    .toolbar-label { font-size: 15px; font-weight: 600; color: var(--text-muted); }
    .toolbar-icons { display: flex; gap: 4px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .icon-btn:hover { background: var(--bg-input); }

    /* Publish */
    .btn-publish {
      margin: 12px 16px; width: calc(100% - 32px);
      background: var(--blue); color: #fff; border: none;
      border-radius: var(--radius-md); padding: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font);
    }
    .btn-publish:hover { background: var(--blue-hover); }
    .btn-publish:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="modal">

  <div class="loader" id="loader"></div>

  <div class="modal-header">
    <div style="width:34px"></div>
    <span class="modal-title">Criar publicação</span>
    <button class="btn-close" title="Fechar">✕</button>
  </div>

  <div class="user-row">
    <div class="avatar">MT</div>
    <div>
      <div class="user-name">Matheus Trindade</div>
      <div class="pub-badge">🌐 Público ▾</div>
    </div>
  </div>

  <textarea class="post-text" id="postText"
    placeholder="O que você está pensando, Matheus?" rows="3"></textarea>

  <div class="url-section">
    <input class="url-input" id="urlInput" type="url"
      placeholder="Cole um link para gerar preview..." />
    <button class="btn-fetch" id="fetchBtn" onclick="fetchPreview()">Buscar</button>
  </div>

  <div class="status" id="statusMsg"></div>

  <div class="preview-wrap">
    <div class="preview-card" id="previewCard">
      <div class="preview-img-wrap" id="imgWrap">
        <span class="img-placeholder" id="imgPlaceholder">Sem imagem disponível</span>
        <img id="previewImg" class="preview-img" alt="preview"
          onerror="this.style.display='none';document.getElementById('imgPlaceholder').style.display='block'" />
        <button class="edit-img-btn" onclick="openImgModal()">✎ Trocar imagem</button>
      </div>

      <div class="preview-body">
        <div class="preview-domain" id="previewDomain"></div>
        <textarea class="preview-title" id="previewTitle" rows="2"
          placeholder="Título da publicação..."></textarea>
        <textarea class="preview-desc" id="previewDesc" rows="3"
          placeholder="Descrição (escreva o que quiser aqui)..."></textarea>
        <div class="edit-hint" id="editHint">✎ Clique no título ou descrição para editar livremente</div>
      </div>

      <div class="remove-row">
        <button class="remove-btn" onclick="removePreview()">✕ Remover preview</button>
      </div>
    </div>

    <!-- Modal trocar imagem -->
    <div class="img-modal" id="imgModal">
      <div class="img-modal-box">
        <div class="img-modal-title">Trocar imagem do preview</div>
        <input class="img-modal-box img-url-input" id="newImgUrl" type="url"
          placeholder="Cole a URL da nova imagem..." />
        <div class="img-modal-btns">
          <button class="btn-cancel" onclick="closeImgModal()">Cancelar</button>
          <button class="btn-apply" onclick="applyNewImg()">Aplicar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <span class="toolbar-label">Adicionar à publicação</span>
    <div class="toolbar-icons">
      <button class="icon-btn" title="Foto/Vídeo">🖼️</button>
      <button class="icon-btn" title="Marcar pessoas">👥</button>
      <button class="icon-btn" title="Sentimento">😊</button>
      <button class="icon-btn" title="Check-in">📍</button>
    </div>
  </div>

  <button class="btn-publish" id="publishBtn" onclick="publish()">Publicar</button>

</div>

<script>
  // ── Helpers de UI ────────────────────────────────────────────────────────────
  function setStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent  = msg;
    el.className    = `status ${type}`;
    el.style.display = msg ? 'block' : 'none';
  }

  function setLoader(pct) {
    const el = document.getElementById('loader');
    if (pct === 0) { el.style.display = 'none'; el.style.width = '0'; return; }
    el.style.display = 'block';
    el.style.width   = pct + '%';
  }

  function showPreviewCard(domain, title, desc, img) {
    document.getElementById('previewDomain').textContent = domain;
    document.getElementById('previewTitle').value        = title;
    document.getElementById('previewDesc').value         = desc;

    const imgEl = document.getElementById('previewImg');
    const ph    = document.getElementById('imgPlaceholder');

    if (img) {
      imgEl.src            = img;
      imgEl.style.display  = 'block';
      ph.style.display     = 'none';
    } else {
      imgEl.style.display  = 'none';
      ph.style.display     = 'block';
    }

    document.getElementById('previewCard').style.display = 'block';
    document.getElementById('editHint').style.display    = 'block';
  }

  // ── Fetch via backend ────────────────────────────────────────────────────────
  async function fetchPreview() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { setStatus('⚠ Cole uma URL válida antes de buscar.', 'error'); return; }

    try { new URL(url); } catch {
      setStatus('⚠ URL inválida. Inclua https:// no início.', 'error'); return;
    }

    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    btn.textContent = '⏳';
    setLoader(30);
    setStatus('Buscando metadados...', 'info');

    try {
      setLoader(60);
      const res  = await fetch(`/api/preview?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      setLoader(100);

      if (!res.ok || data.error) {
        setStatus('⚠ ' + (data.error || 'Erro desconhecido.') + ' Preencha manualmente abaixo.', 'error');
        showPreviewCard(data.domain || new URL(url).hostname.replace(/^www\./,''), '', '', '');
      } else {
        setStatus('✓ Preview carregado com sucesso!', 'ok');
        showPreviewCard(data.domain, data.title, data.description, data.image);
        // Apaga msg de sucesso após 3s
        setTimeout(() => setStatus('', ''), 3000);
      }

    } catch (err) {
      setLoader(100);
      setStatus('⚠ Não foi possível conectar ao servidor. Certifique-se que o backend está rodando.', 'error');
    }

    setTimeout(() => setLoader(0), 600);
    btn.disabled    = false;
    btn.textContent = 'Buscar';
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); fetchPreview(); }
  });

  // ── Imagem modal ─────────────────────────────────────────────────────────────
  function openImgModal()  { document.getElementById('imgModal').classList.add('open'); }
  function closeImgModal() { document.getElementById('imgModal').classList.remove('open'); }

  function applyNewImg() {
    const newUrl = document.getElementById('newImgUrl').value.trim();
    if (!newUrl) return;
    const imgEl = document.getElementById('previewImg');
    imgEl.src            = newUrl;
    imgEl.style.display  = 'block';
    document.getElementById('imgPlaceholder').style.display = 'none';
    closeImgModal();
    document.getElementById('newImgUrl').value = '';
  }
  document.getElementById('newImgUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyNewImg();
  });

  // ── Remover preview ───────────────────────────────────────────────────────────
  function removePreview() {
    document.getElementById('previewCard').style.display = 'none';
    document.getElementById('urlInput').value = '';
    setStatus('', '');
  }

  // ── Publicar ─────────────────────────────────────────────────────────────────
  function publish() {
    const text  = document.getElementById('postText').value.trim();
    const title = document.getElementById('previewTitle').value.trim();
    if (!text && !title) { alert('Escreva algo antes de publicar!'); return; }
    // Aqui você conecta à sua API / banco de dados
    alert('✅ Publicação criada!\n\n(Integre aqui com sua API ou banco de dados.)');
  }
</script>
</body>
</html>
